<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Weekly Workout Tracker</title>

<style>
:root {
  --c1:#4e8ef7;--c1d:#1a2a4a;
  --c2:#3ecf8e;--c2d:#0e2e20;
  --c3:#f5a524;--c3d:#2e2008;

  --bg:#0b1220;
  --card:#111a2b;
  --card2:#0f172a;
  --border:rgba(255,255,255,.12);
  --text:#e5e7eb;
  --muted:rgba(229,231,235,.7);

  --font-sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
  --border-radius-md: 12px;
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--font-sans);
  color:var(--text);
  background:var(--bg);
  min-height:100vh;
}

h2.sr-only{position:absolute;left:-9999px}

.hero{padding:40px 20px 20px}
.hero-lbl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.hero-row{display:flex;align-items:flex-end;justify-content:space-between;gap:12px}
.hero-title{font-size:38px;font-weight:500;line-height:1}
.hero-title span{color:var(--c1)}

.week-nav{display:flex;align-items:center;gap:8px}
.week-nav button{
  background:var(--card);
  border:.5px solid var(--border);
  border-radius:8px;
  padding:6px 10px;
  color:var(--muted);
  cursor:pointer
}
.week-label{font-size:12px;color:var(--muted);min-width:90px;text-align:center}

.nav-tabs{display:flex;gap:8px;padding:0 16px;margin-top:16px}
.nav-tab{
  flex:1;padding:9px 0;border-radius:10px;
  border:.5px solid var(--border);
  background:var(--card);
  font-size:11px;font-weight:500;
  text-align:center;cursor:pointer;color:var(--muted)
}
.nav-tab.a1{background:var(--c1d);border-color:var(--c1);color:var(--c1)}
.nav-tab.a2{background:var(--c2d);border-color:var(--c2);color:var(--c2)}
.nav-tab.a3{background:var(--c3d);border-color:var(--c3);color:var(--c3)}
.nav-tab.a4{background:var(--card2);color:var(--text)}

.panel{display:none;padding:16px 16px 40px}
.panel.vis{display:block}

.p-header{display:flex;justify-content:space-between;margin-bottom:14px}
.p-title{font-size:28px;font-weight:500}
.p-title.c1{color:var(--c1)}.c2{color:var(--c2)}.c3{color:var(--c3)}
.p-equip{font-size:11px;color:var(--muted)}

.tbadge{font-size:13px;padding:5px 10px;border-radius:8px}
.tb1{background:var(--c1d);color:var(--c1)}
.tb2{background:var(--c2d);color:var(--c2)}
.tb3{background:var(--c3d);color:var(--c3)}

.time-row{display:flex;gap:8px;margin-bottom:16px}
.tpill{flex:1;background:var(--card);border:.5px solid var(--border);border-radius:10px;padding:9px 8px;text-align:center}
.tpill-v{font-size:20px}
.tpill-l{font-size:9px;text-transform:uppercase;color:var(--muted)}

.blk{margin-bottom:16px}
.blk-title{font-size:10px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}

.ex-card{background:var(--card);border:.5px solid var(--border);border-radius:12px;margin-bottom:6px}
.ex-card.done{opacity:.55}
.ex-main{display:flex;gap:10px;padding:11px 12px;align-items:center}

.chk{
  width:20px;height:20px;border-radius:6px;
  border:.5px solid var(--border);
  background:var(--card2);
  cursor:pointer;display:flex;align-items:center;justify-content:center
}
.chk.checked{background:var(--ck-color);border-color:var(--ck-color)}
.chk.checked::after{
  content:'';width:5px;height:9px;border:2px solid #fff;
  border-top:none;border-left:none;transform:rotate(45deg)
}

.ex-info{flex:1;cursor:pointer}
.ex-name{font-size:13px}
.ex-detail{font-size:11px;color:var(--muted)}

.sbadge{font-size:13px;padding:3px 8px;border-radius:7px}
.sb1{background:var(--c1d);color:var(--c1)}
.sb2{background:var(--c2d);color:var(--c2)}
.sb3{background:var(--c3d);color:var(--c3)}

.ex-tip{display:none;padding:10px 12px 10px 42px;border-top:.5px solid var(--border);font-size:12px;color:var(--muted)}
.ex-tip.open{display:block}

.workout-footer{
  margin-top:16px;padding:14px 16px;
  background:var(--card);border:.5px solid var(--border);
  border-radius:14px;display:flex;gap:12px
}
.wf-prog{flex:1}
.wf-label{font-size:11px;color:var(--muted);margin-bottom:6px}
.prog-bar{height:6px;background:var(--card2);border-radius:3px}
.prog-fill{height:100%;border-radius:3px}
.wf-btn{
  padding:8px 16px;border-radius:10px;
  border:.5px solid var(--border);
  background:var(--card2);
  font-size:12px;cursor:pointer
}
.complete-btn{background:var(--c1d);color:var(--c1)}
.done-btn{background:var(--c2d);color:var(--c2)}
</style>
</head>

<body>
<h2 class="sr-only">Weekly workout tracker</h2>

<div class="hero">
  <div class="hero-lbl">Home Training</div>
  <div class="hero-row">
    <div class="hero-title"><span>3</span>-Day + Cardio</div>
    <div class="week-nav">
      <button onclick="changeWeek(-1)">←</button>
      <span id="week-label" class="week-label">This week</span>
      <button onclick="changeWeek(1)">→</button>
    </div>
  </div>
</div>

<div class="nav-tabs">
  <div class="nav-tab a1" onclick="switchTab(0)">CORE</div>
  <div class="nav-tab" onclick="switchTab(1)">LOWER</div>
  <div class="nav-tab" onclick="switchTab(2)">UPPER</div>
  <div class="nav-tab" onclick="switchTab(3)">CARDIO</div>
  <div class="nav-tab" onclick="switchTab(4)">DASH</div>
</div>

<div class="panel vis" id="panel-0">
  <div class="p-header">
    <div>
      <div class="p-title c1">Core & Stability</div>
      <div class="p-equip">Dumbbells · Band · Mat</div>
    </div>
    <div class="tbadge tb1">~40 MIN</div>
  </div>

  <div class="blk">
    <div class="blk-title">Warm-up</div>
    <div class="ex-card" data-day="0" data-id="w1">
      <div class="ex-main">
        <div class="chk" style="--ck-color:var(--c1)"></div>
        <div class="ex-info"><div class="ex-name">Jumping jacks</div></div>
        <div class="sbadge sb1">60s</div>
      </div>
    </div>
  </div>

  <div class="workout-footer">
    <div class="wf-prog">
      <div class="wf-label" id="prog-lbl-0">0 / 1 exercises</div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill-0" style="width:0%;background:var(--c1)"></div></div>
    </div>
    <button class="wf-btn complete-btn" id="wf-btn-0" onclick="completeWorkout(0)">Mark complete</button>
  </div>
</div>

<script>
/* storage polyfill */
(function(){
  if(window.storage) return;
  window.storage={
    async get(k){const v=localStorage.getItem(k);return v?{value:v}:null},
    async set(k,v){localStorage.setItem(k,v)},
    async delete(k){localStorage.removeItem(k)},
    async list(p){return{keys:Object.keys(localStorage).filter(k=>k.startsWith(p))}}
  }
})();

let currentTab=0,weekOffset=0;
function monday(offset){
  const d=new Date(),i=(d.getDay()+6)%7;
  d.setDate(d.getDate()-i+offset*7);d.setHours(0,0,0,0);return d;
}
function weekKey(o){const d=monday(o);return`wk-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function weekLabel(o){if(o===0)return"This week";if(o===-1)return"Last week";if(o===1)return"Next week";return monday(o).toLocaleDateString("en-NL",{day:"numeric",month:"short"})}

async function loadData(){
  const r=await storage.get(weekKey(weekOffset));
  return r?JSON.parse(r.value):{checks:{},workouts:[]}
}
async function saveData(d){await storage.set(weekKey(weekOffset),JSON.stringify(d))}

document.querySelectorAll('.ex-card').forEach(c=>{
  c.querySelector('.chk').onclick=async e=>{
    const d=await loadData(),k=`d${c.dataset.day}-${c.dataset.id}`;
    d.checks[k]=!d.checks[k];await saveData(d);render();
  }
});

async function render(){
  const d=await loadData();
  const cards=document.querySelectorAll('.ex-card[data-day="0"]');
  let done=0;
  cards.forEach(c=>{
    const k=`d0-${c.dataset.id}`,chk=c.querySelector('.chk');
    if(d.checks[k]){chk.classList.add('checked');c.classList.add('done');done++}
    else{chk.classList.remove('checked');c.classList.remove('done')}
  });
  document.getElementById('prog-lbl-0').textContent=`${done} / ${cards.length} exercises`;
  document.getElementById('prog-fill-0').style.width=Math.round(done/cards.length*100)+'%';
}

function switchTab(n){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('vis'));
  document.getElementById('panel-'+n).classList.add('vis');
}
function changeWeek(d){weekOffset+=d;document.getElementById('week-label').textContent=weekLabel(weekOffset);render()}
render();
</script>
</body>
</html>
